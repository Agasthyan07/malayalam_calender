<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#BE123C"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect x="48" y="64" width="416" height="416" rx="64" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Header -->
  <path d="M 48 128 C 48 92.7 76.7 64 112 64 L 400 64 C 435.3 64 464 92.7 464 128 L 464 168 L 48 168 Z" fill="url(#headerGrad)" />
  
  <!-- Sub-header Gold Band -->
  <rect x="48" y="168" width="416" height="12" fill="url(#goldGrad)" />
  
  <!-- Left Binding -->
  <rect x="136" y="24" width="32" height="88" rx="16" fill="#1F2937" />
  <rect x="144" y="32" width="16" height="72" rx="8" fill="#9CA3AF" />
  <rect x="136" y="80" width="32" height="4" fill="#111827" />
  
  <!-- Right Binding -->
  <rect x="344" y="24" width="32" height="88" rx="16" fill="#1F2937" />
  <rect x="352" y="32" width="16" height="72" rx="8" fill="#9CA3AF" />
  <rect x="344" y="80" width="32" height="4" fill="#111827" />

  <!-- Center Artwork (Kerala Theme) -->
  <circle cx="256" cy="320" r="112" fill="#047857" />
  <circle cx="256" cy="320" r="96" fill="#10B981" />
  <circle cx="256" cy="320" r="56" fill="#FEF3C7" />
  
  <!-- Golden sun / lamp glow -->
  <circle cx="256" cy="320" r="40" fill="#F59E0B" />
  
  <!-- White Rays -->
  <path d="M 256 244 L 256 220 
           M 256 396 L 256 420 
           M 180 320 L 156 320 
           M 332 320 L 356 320 
           M 202 266 L 185 249 
           M 310 374 L 327 391 
           M 310 266 L 327 249 
           M 202 374 L 185 391" 
        stroke="#ffffff" stroke-width="14" stroke-linecap="round" />
        
  <!-- Center tiny dot -->
  <circle cx="256" cy="320" r="16" fill="#FEF3C7" />
  
</svg>
